<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body {
    width: 280px; font-family: -apple-system, sans-serif; padding: 18px;
    background: #141317; color: #F1EFF7;
  }
  .brand { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
  .dot {
    width: 22px; height: 22px; border-radius: 7px;
    background: linear-gradient(135deg, #7C5CFC 0%, #22D3B8 100%);
    display: flex; align-items: center; justify-content: center;
  }
  h3 { margin: 0; font-size: 14px; font-weight: 600; }
  label { font-size: 11px; color: #9A96A8; display: block; margin-bottom: 5px; }
  input {
    width: 100%; box-sizing: border-box; padding: 9px 10px; border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.1); background: #0D0C10; color: #F1EFF7;
    margin-bottom: 12px; font-size: 13px;
  }
  input:focus { outline: none; border-color: #7C5CFC; }
  button {
    width: 100%; padding: 9px; border-radius: 8px; border: none;
    background: linear-gradient(135deg, #7C5CFC 0%, #22D3B8 100%);
    color: white; font-weight: 600; cursor: pointer; font-size: 13px;
  }
  button:hover { opacity: 0.92; }
  .status { font-size: 11px; margin-top: 8px; color: #22D3B8; min-height: 14px; }
  a { color: #9A96A8; font-size: 11px; text-decoration: none; }
  a:hover { color: #7C5CFC; }
</style>
</head>
<body>
  <div class="brand">
    <span class="dot">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L14.5 9H21.5L15.5 13.5L18 21L12 16.5L6 21L8.5 13.5L2.5 9H9.5L12 2Z" fill="white"/>
      </svg>
    </span>
    <h3>Forge</h3>
  </div>
  <label for="apikey">Groq API Key</label>
  <input type="password" id="apikey" placeholder="gsk_...">
  <button id="save">Save Key</button>
  <div class="status" id="status"></div>
  <br>
  <a href="https://console.groq.com/keys" target="_blank">Get a free Groq API key →</a>
  <script src="popup.js"></script>
</body>
</html>
